<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Dealer Analytics — AutoSwiper Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page">
  <div id="loginScreen" class="admin-login">
    <div class="admin-login-card">
      <span class="eyebrow">Private</span>
      <h1 class="admin-login-title">Dealer Analytics</h1>
      <p class="admin-login-copy">Sign in with your admin AutoSwiper account.</p>
      <form id="loginForm" class="admin-form">
        <label class="admin-label" for="email">Email</label>
        <input id="email" class="admin-input" type="email" autocomplete="email" required />
        <label class="admin-label" for="password">Password</label>
        <input id="password" class="admin-input" type="password" autocomplete="current-password" required />
        <p id="loginError" class="admin-error" hidden></p>
        <p id="bootError" class="admin-error" hidden></p>
        <button id="loginSubmitBtn" class="btn btn--primary admin-submit" type="submit">Sign in</button>
      </form>
    </div>
  </div>

  <div id="dashboard" class="admin-dashboard" hidden>
    <header class="admin-header">
      <div>
        <span class="eyebrow">AutoSwiper Admin</span>
        <h1 class="admin-title">Dealership Analytics</h1>
        <p id="adminEmail" class="admin-subtitle"></p>
      </div>
      <div class="admin-header-actions">
        <div class="admin-range" role="group" aria-label="Date range">
          <button type="button" class="admin-range-btn" data-days="7">7d</button>
          <button type="button" class="admin-range-btn is-active" data-days="30">30d</button>
          <button type="button" class="admin-range-btn" data-days="90">90d</button>
          <button type="button" class="admin-range-btn" data-days="0">All</button>
        </div>
        <a href="creators/" class="btn btn--ghost">Creator affiliates</a>
        <button id="refreshBtn" type="button" class="btn btn--ghost admin-refresh">Refresh</button>
        <button id="signOutBtn" type="button" class="btn btn--ghost">Sign out</button>
      </div>
    </header>

    <section class="admin-kpis" id="kpiRow"></section>

    <section class="admin-panel">
      <div class="admin-panel-head">
        <h2>By dealership</h2>
        <input id="dealerSearch" class="admin-search" type="search" placeholder="Search dealer or source…" />
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table" id="dealerTable">
          <thead>
            <tr>
              <th data-sort="dealer_name">Dealership</th>
              <th data-sort="import_source">Source</th>
              <th data-sort="active_listings" class="num">Listings</th>
              <th data-sort="card_views" class="num">Card views</th>
              <th data-sort="total_swipes" class="num">Swipes</th>
              <th data-sort="swipe_likes" class="num">Likes</th>
              <th data-sort="outbound_clicks" class="num">Click-throughs</th>
              <th data-sort="garage_saves" class="num">Garage saves</th>
            </tr>
          </thead>
          <tbody id="dealerTableBody"></tbody>
        </table>
      </div>
      <p id="loadError" class="admin-error admin-error--inline" hidden></p>
    </section>

    <section class="admin-panel" id="detailPanel" hidden>
      <div class="admin-panel-head">
        <div>
          <h2 id="detailTitle">Inventory</h2>
          <p id="detailSubtitle" class="admin-subtitle"></p>
        </div>
        <button id="closeDetailBtn" type="button" class="btn btn--ghost">Close</button>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table admin-table--detail">
          <thead>
            <tr>
              <th>Listing</th>
              <th class="num">Price</th>
              <th>Status</th>
              <th class="num">Views</th>
              <th class="num">Swipes</th>
              <th class="num">Likes</th>
              <th class="num">Clicks</th>
              <th class="num">Saves</th>
            </tr>
          </thead>
          <tbody id="detailTableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="../assets/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="admin.js"></script>
</body>
</html>
